# ===============================================================
# CORE APPLICATION
# ===============================================================
spring.application.name=tea4life-product-service
spring.threads.virtual.enabled=true
server.port=8080
# ===============================================================
# INFRASTRUCTURE & DATA
# ===============================================================
## SQL - MariaDB
spring.datasource.url=jdbc:mariadb://${DATASOURCE_URL}/tea4life-product-service-db
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
### Data ID Generator
snowflake.worker-id=${SNOWFLAKE_WORKER_ID}
snowflake.datacenter-id=${SNOWFLAKE_DATACENTER_ID}
### Kafka
# Settings
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVER}
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP_ID}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
# Topic
spring.kafka.topic.storage-delete-file=${STORAGE_DELETE_FILE_TOPIC:storage-delete-file-topic}
spring.kafka.topic.product-clicked=${PRODUCT_CLICKED_TOPIC:product-clicked-topic}
spring.kafka.topic.audit-log=${AUDIT_LOG_TOPIC:audit-topic}
### Eureka
eureka.client.enabled=${EUREKA_CLIENT_ENABLED:false}
spring.cloud.discovery.enabled=${EUREKA_DISCOVERY_ENABLED:false}
eureka.client.service-url.defaultZone=${EUREKA_SERVICE_URL:}
eureka.instance.prefer-ip-address=${EUREKA_SERVICE_PREFER_IP_ADDRESS:false}
### Service URLs
service.url.storage=${STORAGE_SERVICE_URL}
service.url.recommendation=${RECOMMENDATION_SERVICE_URL}
# ===============================================================
# OBSERVABILITY (LOGS & HEALTH)
# ===============================================================
## Actuator
management.endpoints.web.exposure.include=health,info
management.info.env.enabled=true
management.endpoint.health.probes.enabled=true
management.endpoint.health.status.http-mapping.UP=200
management.endpoint.health.status.http-mapping.DOWN=503
## Logging
logging.level.root=INFO
logging.level.me.huynhducphu=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
# ===============================================================
# WEB / MVC CONFIGURATION
# ===============================================================
## Swagger / Docs
springdoc.api-docs.enabled=false
springdoc.api-docs.version=openapi_3_0
springdoc.swagger-ui.enabled=false
## Pagination
spring.data.web.pageable.one-indexed-parameters=true
spring.data.web.pageable.max-page-size=20
## File Upload Limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB
## JSON Format
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Ho_Chi_Minh


